<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Developer Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f4f6f9;
      color: #333;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 30px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    header p {
      margin-top: 10px;
      color: #ccc;
    }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      background: #ddd;
    }

    .card-content {
      padding: 15px;
    }

    .card-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    /* 🔥 BAGIAN PERBAIKAN */
    .card-buttons {
      display: flex;
      justify-content: space-between; /* kiri kanan rata */
      gap: 10px;
    }

    .card-buttons a {
      flex: 1; /* biar sama lebar */
      text-align: center;
      padding: 10px;
      background: #3498db;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
    }

    .card-buttons a:last-child {
      background: #2ecc71; /* beda warna biar keren */
    }

    .card-buttons a:hover {
      opacity: 0.9;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <h1>Yadin XD Studio</h1>
  <p>Developer Portfolio & Tools Collection</p>
</header>

<div class="container">
  <div class="grid">

    <!-- APP 1 -->
    <div class="card">
      <img src="https://via.placeholder.com/400x200">
      <div class="card-content">
        <div class="card-title">HRPAY - Kalkulator HRD</div>

        <div class="card-buttons">
          <a href="#">Aplikasi</a>
          <a href="#">Privasi</a>
        </div>

      </div>
    </div>

    <!-- APP 2 -->
    <div class="card">
      <img src="https://via.placeholder.com/400x200">
      <div class="card-content">
        <div class="card-title">Nama Aplikasi 2</div>

        <div class="card-buttons">
          <a href="#">Aplikasi</a>
          <a href="#">Privasi</a>
        </div>

      </div>
    </div>

  </div>
</div>

<footer>
 Yadin XD | All Rights Reserved
</footer>

</body>
</html>
