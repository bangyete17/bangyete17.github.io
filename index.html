<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Developer Portfolio Yadin XD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif;}
body{background:#f5f7fb; color:#1f2937; display:flex; justify-content:center;}
.container{width:100%; max-width:600px; padding:0 16px; border:1px solid #e5e7eb;}
header{padding:20px; background:#fff; border:1px solid #e5e7eb; border-radius:12px; margin-bottom:12px;}
.headerName{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;}
.headerTitle{font-size:20px; font-weight:700; color:#1541a1; letter-spacing:0.5px; line-height:1.3;}
.social{margin-top:10px; padding:8px; display:flex; justify-content:center; align-items:center; gap:12px; border:1px solid #e5e7eb; border-radius:10px; flex-wrap:wrap;}
.social a{text-decoration:none; color:#2563eb; font-size:12px; padding:4px 6px;}
.social a:hover{text-decoration:underline;} 
.headerDesc{margin-top:5px; font-size:12px; color:#6b7280;}
.gridWrap{display:grid; grid-template-columns:repeat(2, 1fr); gap:10px;}
.gridContent{background:#fff; border:1px solid #e5e7eb; border-radius:14px; padding:14px; transition:0.2s;}
.gridContent:hover{transform:translateY(-4px); box-shadow:0 8px 20px rgba(0,0,0,0.08);}
.titleApp{font-size:15px; font-weight:600; margin-bottom:6px; text-align:center; word-break:break-word;}
.descApp{font-size:12px; color:#6b7280; margin-bottom:12px; text-align:center; word-break:break-word;}
.buttonGrid{display:flex; gap:8px;}
.buttonPlaystore, .buttonAboutApp{flex:1; padding:8px; font-size:12px; border-radius:10px; text-align:center; cursor:pointer; user-select:none; transition:0.2s;}
.buttonPlaystore{background:#22c55e; color:#fff;}
.buttonAboutApp{background:#3b82f6; color:#fff;}
.buttonPlaystore:hover, .buttonAboutApp:hover{opacity:0.85; transform:scale(1.02);} 
a{text-decoration:none;}
.footer{margin-top:20px; margin-bottom:20px; text-align:center; border-top:1px solid #e5e7eb; font-size:12px; color:#1f2937; padding:10px;}
/* RESPONSIVE */
@media (max-width:500px){
.gridWrap{grid-template-columns:1fr;}}
</style>
</head>
<body>
<!-- CONTAINER -->
<div class="container"><!--container start -->
<!-- HEADER -->
<header id="header"><!--header start -->
  
<div class="headerName">
<div class="headerTitle">Yadin XD - Develover Apps </div>
<div class="headerDesc">A lazy guy with big dreams</div>
</div>
  
<div class="social">
<a href="https://bangyete17.github.io">GitHub</a>
<a href="https://www.youtube.com/@YadinXD" target="_blank">YouTube</a>
<a href="mailto:bangyete17@gmail.com">Mail</a>
</div>
  
</header><!--header end -->

<!-- GRID & CONTENT -->
<div class="gridWrap"><!--gridWrap start -->
  
<div class="gridContent"><!--gridContent start -->
<div class="titleApp">COOKID Resep Masakan</div>
<div class="descApp">Resep Masakan Indonesia</div>
<div class="buttonGrid"><!--buttonGrid start -->
<div class="buttonPlaystore">Download</div>
<a class="buttonAboutApp" href="https://bangyete17.github.io/data-server-app/COOKID/Kebijakan-Privasi-COOKID.html">About App</a>
</div><!--buttonGrid end -->
</div><!--gridContent end -->
  
<div class="gridContent"><!--gridContent start -->
<div class="titleApp">HRPAY Kalkulator HRD</div>
<div class="descApp">Kalkulator Payroll dan Severance</div>
<div class="buttonGrid"><!--buttonGrid start -->
<a class="buttonPlaystore" href="https://play.google.com/store/apps/details?id=com.yadinxd.hrpay_hrdpaymenttool" target="_blank">Download</a>
<a class="buttonAboutApp" href="https://bangyete17.github.io/data-server-app/HRPAY/Kebijakan-Privasi-HRPAY.html">About App</a>
</div><!--buttonGrid end -->
</div><!--gridContent end -->
  
</div><!--gridWrap end --> 
<div class="footer">© Yadin XD — A lazy guy with big dreams</div>
</div><!--container end -->
</body>
</html>
